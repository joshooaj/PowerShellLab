name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - slides.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install marp-cli
        run: npm install -g @marp-team/marp-cli

      - name: Convert slides to HTML
        run: marp slides.md -o site/index.html --theme theme/summit-2026.css

      - name: Copy assets
        run: cp -r assets site/ && cp theme/*.png site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
